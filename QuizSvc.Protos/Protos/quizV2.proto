  optional string image = 6;
  QuizTypeProto type = 7;
  string tenant = 8; 
  optional string parent_id = 9;
  QuizSourceProto source = 10;
  repeated DimensionMiniResponse dimensions = 11;
  repeated QuestionMiniResponse questions = 12;
  string estimate_time = 13;
  int32 submited_amount = 14;
  CampaignQuizSettingResponseProto quiz_setting = 15;
  google.protobuf.Timestamp created_at = 16;
