syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
option csharp_namespace = "Quiz.Protos";

package QuizV2Svc;

service QuizV2Grpc {
  // Campaigns
  rpc CreateCampaign(CreatedCampaignRequest) returns (CampaignMiniResponse);
  rpc GetCampaignDetail(GetCampaignDetailRequest) returns (CampaignResponse);
  rpc UpdateCampaign(UpdatedCampaignRequest) returns (CampaignMiniResponse);
  rpc GetCampaignList(GetCampaignListRequest) returns (PagedCampaignMiniResponse);
  
  // Campaigns

  //CampainQuizSetting
  rpc UpdateCampaignQuizSetting(UpdatedCampaignQuizSettingRequest) returns (CampaignQuizSettingMiniResponse);
  rpc GetCampaignQuizSettingDetail(GetCampaignQuizSettingDetailRequest) returns (CampaignQuizSettingResponseProto);
  rpc CreateCampaignQuizSetting(CreateCampaignQuizSettingProto) returns (CampaignQuizSettingMiniResponse);
  rpc DeleteCampaignQuizSetting(DeleteCampaignQuizSettingRequest) returns (google.protobuf.Empty);
   //CampainQuizSetting

  //Quiz
  rpc CreateQuiz(CreatedQuizRequest) returns (QuizMiniResponse);
  rpc UpdateQuiz(UpdatedQuizRequest) returns (QuizMiniResponse);
  rpc GetQuizList(GetQuizListRequest) returns (PagedQuizMiniResponse);
  rpc GetQuizDetail(GetQuizDetailRequest) returns (QuizResponse);
  rpc CloneQuiz(CloneQuizRequest) returns (QuizMiniResponse);
  rpc DeepCopyQuiz(DeepCopyQuizRequest) returns (QuizMiniResponse);
  rpc GetQuizInCampaignDetail(GetQuizInCampaignDetailRequest) returns (GetQuizInCampaignDetailResponse);
  //Quiz

  //Question
   rpc UpdateQuestion(UpdatedQuestionRequest) returns (QuestionSuccessResponse);
   rpc CreateQuizQuestion(CreatedQuizQuestionRequest) returns (QuestionSuccessResponse);
   rpc GetQuestionDetail(GetQuestionDetailRequest) returns (QuestionMiniResponse);
   rpc DeletedQuestion(DeletedQuestionRequest) returns (google.protobuf.Empty);
  //Question

  //Dimension
  rpc CreateDimension(CreatedNewDimensionRequest) returns (DimensionMiniResponse);
  rpc UpdateDimension(UpdatedQuizDimensionRequest) returns (DimensionMiniResponse);
  rpc SyncDimension(SyncDimensionRequest) returns (google.protobuf.Empty);
  rpc GetDimensionDetail(GetDimensionDetailRequest) returns (DimensionResponse);
  rpc GetQuizDimensionList(GetQuizDimensionListRequest) returns (PagedDimensionMiniResponse);
  //Dimension

   //QuizAttempt
  rpc CreateQuizAttempt(CreateQuizAttemptRequest) returns (QuizAttemptMiniResponse);
  rpc UpdateQuizAttempt(UpdateQuizAttemptRequest) returns (QuizAttemptMiniResponse);
  rpc GetQuizAttemptQuery(GetQuizAttemptQueryRequest) returns (QuizAttemptResponse);
  //QuizAttempt

    //QuizResult
  rpc SubmitQuizAttempt(SubmitQuizAttemptRequest) returns (QuizResultMiniResponse);
  rpc GetQuizResultDetail(GetQuizResultDetailRequest) returns (QuizResultResponse);
  rpc GetQuizResultList(GetQuizResultListRequest) returns (PagedCampaignQuizResultResponse);
  //QuizResult

  // Lead
  rpc UpdateLead(UpdateLeadRequest) returns (LeadMiniResponse);
  rpc GetLeadDetail(GetLeadDetailRequest) returns (LeadResponse);
  rpc GetLeadList(GetLeadListRequest) returns (PagedLeadMiniResponse);
  
  // Lead Interaction & Scoring
  rpc LogInteraction(LogInteractionRequest) returns (google.protobuf.Empty);
  rpc GetLeadEngagement(GetLeadEngagementRequest) returns (LeadEngagementResponse);
  rpc UpdateScoringRule(UpdateScoringRuleRequest) returns (ScoringRuleResponse);
  rpc GetScoringRules(GetScoringRulesRequest) returns (ScoringRulesResponse);
  rpc GetLeadInteractions(GetLeadInteractionsRequest) returns (PagedInteractionLogMiniResponse);
  // Lead Interaction & Scoring

  // Recommendation
  rpc GetRecommendations(GetRecommendationsRequest) returns (RecommendationsResponse);
  rpc GetRecommendationList(GetRecommendationListRequest) returns (PagedRecommendationMiniResponse);
  rpc GetRecommendationDetail(GetRecommendationDetailRequest) returns (RecommendationProto);
  rpc CreateRecommendation(CreateRecommendationRequest) returns (RecommendationMiniResponse);
  rpc UpdateRecommendation(UpdateRecommendationRequest) returns (RecommendationMiniResponse);
  rpc DeleteRecommendation(DeleteRecommendationRequest) returns (google.protobuf.Empty);

  // ScoringRule
  rpc CreateScoringRule(CreatedScoringRuleRequest) returns (ScoringRuleMiniResponse);
  rpc UpdatedScoringRule(UpdatedScoringRuleRequest) returns (ScoringRuleMiniResponse);
  rpc GetScoringRuleDetail(GetScoringRuleDetailRequest) returns (ScoringRuleDetailResponse);
  rpc DeleteScoringRule(DeleteScoringRuleRequest) returns (google.protobuf.Empty);
  rpc GetScoringRuleList(GetScoringRuleListRequest) returns (PagedScoringRuleMiniResponse);
}

// Campaigns

message CreatedCampaignRequest {
  string name = 1;
  optional string description = 2;
  string address = 3;
  optional string image = 4;
  CampaignStatusProto status = 5;
  string tenant = 6;
  repeated CampaignQuizSettingProto quiz_settings = 7;
  optional google.protobuf.Timestamp start_time = 8;
  optional google.protobuf.Timestamp end_time = 9;
}

message CampaignMiniResponse {
  string id = 1;
  string code = 2;
  string name = 3;
  string address = 4;
  CampaignStatusProto status = 5;
  optional google.protobuf.Timestamp start_time = 6;
  optional google.protobuf.Timestamp end_time = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetCampaignDetailRequest {
  string id = 1;
}

message CampaignResponse {
  string id = 1;
  string code = 2;
  string name = 3;
  optional string description = 4;
  string address = 5;
  optional string image = 6;
  CampaignStatusProto status = 7;
  string tenant = 8;
  optional google.protobuf.Timestamp start_time = 9;
  optional google.protobuf.Timestamp end_time = 10;
  repeated CampaignQuizSettingResponseProto quiz_settings = 11;
  google.protobuf.Timestamp created_at = 12;
  string created_by = 13;
  optional google.protobuf.Timestamp last_modified_at = 14;
  optional string last_modified_by = 15;
}

message UpdatedCampaignRequest {
  string id = 1;
  string name = 2;
  optional string description = 3;
  string address = 4;
  optional string image = 5;
  CampaignStatusProto status = 6;
  string tenant = 7;
  optional google.protobuf.Timestamp start_time = 8;
  optional google.protobuf.Timestamp end_time = 9;
  repeated string quiz_setting_deteted_ids = 10;
  repeated CampaignQuizSettingProto quiz_setting_createds = 11;
  repeated UpdatedCampaignQuizSetting quiz_setting_updateds = 12;
}

message GetCampaignListRequest {
  string code = 1;
  string name = 2;
  optional CampaignStatusProto status = 6;
  string tenant = 7;
  optional google.protobuf.Timestamp from_date = 8;
  optional google.protobuf.Timestamp to_date = 9;
  int32 page = 10;
  int32 page_size = 11;
}


message PagedCampaignMiniResponse {
  repeated CampaignMiniResponse data = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}


// Campaigns

// CampaignQuizSetting
message CampaignQuizSettingResponseProto {
  string id = 1;
  string quiz_id = 2;
  bool is_active = 3;
  int32 max_attempts = 4;
  LeadCollectionPolicyProto lead_collection_policy = 5;
  CheckpointConfigProto checkpoint_config = 6;
}

message GetCampaignQuizSettingDetailRequest {
  string id = 1;
}

message DeleteCampaignQuizSettingRequest {
  string id = 1;
}

message CampaignQuizSettingProto {
  string quiz_id = 1;
  bool is_active = 2;
  int32 max_attempts = 3;
  LeadCollectionPolicyProto lead_collection_policy = 4;
  CheckpointConfigProto checkpoint_config = 5;
}

message CreateCampaignQuizSettingProto {
  string campaign_id = 1;
  string quiz_id = 2;
  bool is_active = 3;
  int32 max_attempts = 4;
  LeadCollectionPolicyProto lead_collection_policy = 5;
  CheckpointConfigProto checkpoint_config = 6;
}

message UpdatedCampaignQuizSetting {
  string id = 1;
  string quiz_id = 2;
  bool is_active = 3;
  int32 max_attempts = 4;
  LeadCollectionPolicyProto lead_collection_policy = 5;
  CheckpointConfigProto checkpoint_config = 6;
}

message LeadCollectionPolicyProto {
  repeated LeadFieldProto required_fields = 1;
}

message CheckpointConfigProto {
  repeated QuizCheckpointProto checkpoints = 1;
}

message QuizCheckpointProto {
  string key = 1;
  CheckpointTriggerProto trigger = 2;
  CheckpointContentProto content = 3;
}

message CheckpointTriggerProto {
  CheckpointTriggerTypeProto checkpoint_trigger_type = 1;
  int32 question_number = 2;
  optional int32 interval = 3;
  optional double progress_percent = 4;
}

message CheckpointContentProto {
  CheckpointContentTypeProto checkpoint_content_type = 1;
  optional PromoContentProto promo = 2;
  optional GamificationContentProto gamification = 3;
  optional ProgressiveFormContentProto progressive_form = 4;
  optional GateContentProto gate = 5;
}

message PromoContentProto {
  string image = 1;
  string title = 2;
  string message = 3;
  string button_text = 4;
}

message GamificationContentProto {
  string title = 1;
  string message = 2;
  string show_progress_bar = 3;
}

message ProgressiveFormContentProto {
  repeated FormFieldProto fields = 1;
}

message FormFieldProto {
  string field_key = 1;
  string label = 2;
  FormFieldTypeProto type = 3;
  bool is_required = 4;
}

message GateContentProto {
  string title = 1;
  string message = 2;
  repeated FormFieldProto required_fields = 3;
}

message UpdatedCampaignQuizSettingRequest {
  string id = 1;
  string quiz_id = 2;
  bool is_active = 3;
  int32 max_attempts = 4;
  LeadCollectionPolicyProto lead_collection_policy = 5;
  CheckpointConfigProto checkpoint_config = 6;
}

message CampaignQuizSettingMiniResponse {
  string id = 1;
  string quiz_id = 2;
  bool is_active = 3;
  int32 max_attempts = 4;
}

// CampaignQuizSetting

