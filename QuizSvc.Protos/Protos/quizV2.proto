//Quiz

//Dimension
message CreatedDimensionRequest {
  string temp_dim_id = 1;
  string title = 2;
  optional string description = 3;
}

message CreatedNewDimensionRequest {
  string quiz_id = 1;
  string title = 2;
  optional string description = 3;
}

message DimensionMiniResponse {
  string id = 1;
  string title = 2;
  optional string description = 3;
}

message UpdatedDimensionRequest {
  optional string id = 1;
  string title = 2;
  optional string description = 3;
}

message UpdatedQuizDimensionRequest {
